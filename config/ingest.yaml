# Default Ingestion Configuration
# See docs_it/ingest-config-schema.md for complete documentation

ingest:
  # ============================================================================
  # INPUT DISCOVERY
  # ============================================================================
  input:
    dirs:
      - "ingestion_test_data/raw"  # Default input directory
    supported_formats:
      - pdf
      - docx
      - doc
      - html
      - htm
      - txt
      - xml
      - md
      - json
    max_depth: 10
    exclude_paths:
      - .git
      - __pycache__
      - node_modules
      - .DS_Store
  
  # ============================================================================
  # ZIP EXTRACTION
  # ============================================================================
  zip_extraction:
    enabled: true
    max_archive_depth: 3
    temp_dir: null  # Directory temporanea per ZIP; se null usa la temp di sistema
    exclude_patterns_in_archive:
      - "__MACOSX/*"
      - "*.DS_Store"
  
  # ============================================================================
  # ID GENERATION (DETERMINISTIC)
  # ============================================================================
  id_generation:
    strategy: sha256-16  # Legacy preserved: sha256-16 or sha256-32
    prefix: "DOC_"
    suffix: ""
    hash_digits: 16  # Optional exact SHA hex digits limit (8-64, even)
    hash_length_bytes: null  # Optional alternative to hash_digits (bytes 4-32)
    naming_strategy: hash_only  # hash_only, incremental_only, hash_then_incremental, incremental_then_hash
    incremental_prefix: "DOC"
    incremental_pad_digits: 6
    enabled_hash: true
    enabled_incremental: false
  
  # ============================================================================
  # DOCUMENT LOADING & TEXT EXTRACTION
  # ============================================================================
  loader:
    encoding_fallback:
      - utf-8
      - latin-1
      - cp1252
      - iso-8859-1
    max_text_length: 1000000

    # Format-specific settings used by ingestion loader
    pdf:
      extract_text: true
      max_pages: 0  # 0 = all pages
  
  # ============================================================================
  # METADATA HANDLING (SIDECAR FILES)
  # ============================================================================
  metadata:
    enabled: true
    base_paths:
      - "."  # Default: current directory and subdirectories
    search_strategies:
      - name: by_name
        description: "exact filename match with .json extension"
        rule: "{basename}.json"
      
      - name: in_directory
        description: "any .json file in same directory"
        rule: "*.json"
      
      - name: in_parent
        description: "metadata in parent if directory is named 'attachments'"
        rule: "parent_if_attachments"
    
    format: json
    validation_enabled: false
  
  # ============================================================================
  # OUTPUT & PERSISTENCE
  # ============================================================================
  output:
    backend: filesystem
    
    filesystem:
      dir_pattern: "{doc_id}"  # Directory for each document - FULL DOCUMENT ID ONLY, no prefix
      preserve_extension: true
      create_manifest: true
      manifest_filename: manifest.json
  
  # ============================================================================
  # LOGGING & DEBUGGING
  # ============================================================================
  logging:
    level: INFO  # DEBUG, INFO, WARNING, ERROR
    file: "logs/ingest.log"
    include_timings: false